name: Build & Release SNBT Math Mentor

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Permission global untuk seluruh workflow
permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build Debug APK
  # ─────────────────────────────────────────
  build-debug:
    name: 🐛 Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 📥 Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: 🔑 Grant permission gradlew
        run: chmod +x gradlew

      - name: 🐛 Build Debug (split ABI)
        run: ./gradlew assembleDebug --no-daemon --build-cache

      - name: 📋 List APKs
        run: find app/build/outputs/apk/debug -name "*.apk" | sort

      - name: 📤 Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 2: Build Release + GitHub Release
  # ─────────────────────────────────────────
  build-release:
    name: 🚀 Build Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # wajib untuk buat GitHub Release
    if: |
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master')
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 📥 Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: 🔑 Grant permission gradlew
        run: chmod +x gradlew

      - name: 🔐 Decode Keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: 🚀 Build Release APK (signed)
        if: env.HAS_KEYSTORE == 'true'
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon --build-cache

      - name: 🚀 Build Release APK (unsigned)
        if: env.HAS_KEYSTORE != 'true'
        run: ./gradlew assembleRelease --no-daemon --build-cache

      - name: 📋 List Release APKs
        run: find app/build/outputs/apk/release -name "*.apk" | sort

      - name: 🏷️ Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[^"]+"' | tr -d '"' | head -1)
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y%m%d')
          IS_TAG=${{ startsWith(github.ref, 'refs/tags/') }}

          if [ "$IS_TAG" = "true" ]; then
            TAG_NAME="${{ github.ref_name }}"
            IS_PRE="false"
          else
            TAG_NAME="v${VERSION}-${DATE}-${COMMIT}"
            IS_PRE="true"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRE}" >> $GITHUB_OUTPUT

      - name: 🎁 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: "SNBT Math Mentor ${{ steps.version.outputs.tag_name }}"
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
          body: |
            ## 📱 SNBT Math Mentor ${{ steps.version.outputs.tag_name }}

            Program intensif **38 Hari** untuk menaklukkan Matematika UTBK SNBT 2026.

            ### 📥 Pilih APK sesuai device kamu:
            | File | Target Device |
            |------|--------------|
            | `*arm64-v8a*` | HP Android modern 2017+ — **PILIH INI** |
            | `*armeabi-v7a*` | HP Android lama 32-bit |
            | `*x86_64*` | Emulator / BlueStacks |
            | `*universal*` | Semua device (ukuran lebih besar) |

            ### ✨ Fitur
            - 38 hari materi terstruktur: Aritmetika → Geometri → Statistika → Penalaran
            - Quiz harian dengan auto-scoring & timer
            - Error Log untuk review kesalahan
            - Reminder harian 07.00 WIB
            - Dark mode support
            - Split ABI — APK lebih kecil, RAM ringan

            ### 📋 Cara Install
            1. Download APK sesuai device kamu
            2. Buka **Settings → Install unknown apps** → aktifkan
            3. Buka file APK dan install

            ---
            🔨 Build `${{ github.sha }}` | Run #${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
