name: Build SNBT Math Mentor APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 📥 Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🐛 Build Debug APK (split ABI)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📋 List generated APKs
        run: find app/build/outputs/apk -name "*.apk" | sort

      - name: 📤 Upload Debug APKs (all ABI splits)
        uses: actions/upload-artifact@v4
        with:
          name: SNBT-MathMentor-Debug-AllABI
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 📥 Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🔐 Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: 🚀 Build Release APK — signed (split ABI)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: 🚀 Build Release APK — unsigned fallback (split ABI)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: ./gradlew assembleRelease --no-daemon

      - name: 📋 List generated Release APKs
        run: find app/build/outputs/apk/release -name "*.apk" | sort

      - name: 📤 Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: SNBT-MathMentor-Release-arm64-v8a
          path: app/build/outputs/apk/release/*arm64*.apk
          retention-days: 30

      - name: 📤 Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: SNBT-MathMentor-Release-armeabi-v7a
          path: app/build/outputs/apk/release/*armeabi*.apk
          retention-days: 30

      - name: 📤 Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: SNBT-MathMentor-Release-x86_64
          path: app/build/outputs/apk/release/*x86_64*.apk
          retention-days: 30

      - name: 📤 Upload Universal APK (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: SNBT-MathMentor-Release-universal
          path: app/build/outputs/apk/release/*universal*.apk
          retention-days: 30
